<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Wheat Inward 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#1c2333;--sur3:#21262d;
  --bdr:#30363d;--bdr2:#21262d;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --grn:#3fb950;--grn-d:#1a3a1f;
  --amb:#d29922;--amb-d:#3a2c0a;
  --blu:#58a6ff;--blu-d:#0d2044;
  --pur:#bc8cff;--pur-d:#2a1a44;
  --red:#f85149;--red-d:#3a0f0e;
  --tel:#39d0c8;--tel-d:#0a2e2c;
  --acc:#f0883e;--acc-d:#3a1f08;
  --r:10px;--nh:56px;--nb:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;font-size:14px;overflow-x:hidden}

/* topbar */
.tb{position:sticky;top:0;z-index:100;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;padding:0 14px;height:var(--nh)}
.tb-logo{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:var(--acc);flex:1}
.tb-logo span{color:var(--tx2);font-weight:400;font-size:12px}
.tb-badge{background:var(--acc-d);color:var(--acc);border:1px solid var(--acc);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600}

/* bottomnav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--sur);border-top:1px solid var(--bdr);display:grid;grid-template-columns:repeat(5,1fr);height:var(--nb)}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--tx3);font-family:'Noto Sans',sans-serif;font-size:9px;font-weight:500;transition:color .15s;padding:5px 0}
.nb svg{width:19px;height:19px}
.nb.active{color:var(--acc)}

/* pages */
.pg{display:none;padding:12px 12px calc(var(--nb)+12px);min-height:100dvh}
.pg.active{display:block}

/* typography */
.sh{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin:16px 0 7px}
.sh:first-child{margin-top:0}

/* cards */
.cd{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:9px;position:relative;overflow:hidden}

/* stat grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px}
.sc{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 8px;text-align:center}
.sv{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;line-height:1}
.sl{font-size:9px;color:var(--tx3);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.c-grn{color:var(--grn)}.c-amb{color:var(--amb)}.c-blu{color:var(--blu)}.c-pur{color:var(--pur)}.c-acc{color:var(--acc)}.c-tel{color:var(--tel)}.c-red{color:var(--red)}

/* pills */
.pi{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.pi.grn{background:var(--grn-d);color:var(--grn)}.pi.amb{background:var(--amb-d);color:var(--amb)}.pi.blu{background:var(--blu-d);color:var(--blu)}.pi.pur{background:var(--pur-d);color:var(--pur)}.pi.red{background:var(--red-d);color:var(--red)}.pi.tel{background:var(--tel-d);color:var(--tel)}.pi.acc{background:var(--acc-d);color:var(--acc)}.pi.gray{background:var(--sur3);color:var(--tx2)}

/* progress */
.pw{margin:5px 0}
.pl{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-bottom:3px}
.pb{height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s}
.pf.grn{background:var(--grn)}.pf.amb{background:var(--amb)}.pf.tel{background:var(--tel)}.pf.blu{background:var(--blu)}.pf.red{background:var(--red)}

/* date chips */
.dc-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:5px;margin-bottom:11px;scrollbar-width:none}
.dc-bar::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:5px 11px;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .15s}
.dc.active{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}

/* search */
.sb{display:flex;gap:7px;margin-bottom:11px}
.si{flex:1;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:8px 11px;color:var(--tx);font-family:'Noto Sans',sans-serif;font-size:13px;outline:none}
.si::placeholder{color:var(--tx3)}
.si:focus{border-color:var(--acc)}
.fb{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:8px 11px;color:var(--tx2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans',sans-serif}
.fb.active{border-color:var(--acc);color:var(--acc);background:var(--acc-d)}

/* slip cards */
.sk{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.sk:active{border-color:var(--acc)}
.sk-h{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px 8px;background:var(--sur2);border-bottom:1px solid var(--bdr2)}
.sk-no{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--acc)}
.sk-tr{font-size:11px;color:var(--tx2);margin-top:1px}
.sk-b{padding:9px 12px}
.sk-r{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--bdr2)}
.sk-r:last-child{border-bottom:none}
.sk-l{font-size:11px;color:var(--tx2)}
.sk-v{font-size:13px;font-weight:500;font-family:'Rajdhani',sans-serif}

/* forms */
.fg{margin-bottom:13px}
.fl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fi,.fs{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--tx);font-family:'Noto Sans',sans-serif;font-size:14px;outline:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--acc)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fc{background:var(--sur3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--amb)}
.fc.grn{color:var(--grn)}.fc.tel{color:var(--tel)}.fc.acc{color:var(--acc)}

/* buttons */
.btn{width:100%;padding:12px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:.4px;transition:opacity .15s;margin-bottom:9px}
.btn:active{opacity:.8}
.btn-p{background:var(--acc);color:#fff}
.btn-s{background:var(--sur2);color:var(--tx2);border:1px solid var(--bdr)}
.btn-e{background:var(--blu-d);color:var(--blu);border:1px solid var(--blu)}
.btn-sm{width:auto;padding:6px 14px;font-size:12px;border-radius:6px;margin-bottom:0;display:inline-block}

/* tabs */
.tabs{display:flex;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:3px;margin-bottom:13px}
.tab{flex:1;padding:6px 3px;border-radius:7px;border:none;background:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--tx3);transition:all .15s;letter-spacing:.3px}
.tab.active{background:var(--acc);color:#fff}

/* chart */
.bc{display:flex;align-items:flex-end;gap:3px;height:65px;margin:5px 0 2px}
.bc-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bc-b{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bc-l{font-size:8px;color:var(--tx3);white-space:nowrap}

/* var dot */
.vd{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px}

/* divider */
.dv{height:1px;background:var(--bdr2);margin:10px 0}

/* detail grid */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:7px 0}
.db{background:var(--sur3);border:1px solid var(--bdr2);border-radius:8px;padding:9px}
.db-h{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);font-weight:600;margin-bottom:6px}
.kv{display:flex;justify-content:space-between;padding:2px 0}
.kk{font-size:11px;color:var(--tx2)}
.kv-v{font-size:12px;font-weight:600;font-family:'Rajdhani',sans-serif}

/* formula chain */
.fch{display:flex;align-items:center;gap:3px;flex-wrap:wrap;background:var(--sur3);border-radius:7px;padding:7px 9px;margin:6px 0}
.fb2{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 7px;font-size:11px;font-weight:600}
.fb2.r{background:var(--amb-d);border-color:var(--amb);color:var(--amb)}
.fop{font-size:14px;color:var(--tx3);font-weight:700}

/* modal */
.mo{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);align-items:flex-end}
.mo.open{display:flex}
.md{background:var(--sur);border:1px solid var(--bdr);border-radius:16px 16px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding:18px 14px 28px;animation:su .25s ease}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
.mt{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px}

/* ledger */
.ledger-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr2);gap:8px}
.ledger-row:last-child{border-bottom:none}
.lr-no{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--acc);min-width:42px}
.lr-info{flex:1;min-width:0}
.lr-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lr-sub{font-size:10px;color:var(--tx3)}
.lr-wt{text-align:right;min-width:70px}
.lr-wt-val{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.lr-wt-lbl{font-size:9px;color:var(--tx3)}
.lr-amt{text-align:right;min-width:80px}
.lr-amt-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--grn)}
.lr-amt-lbl{font-size:9px;color:var(--tx3)}

/* session row */
.ses-row{background:var(--sur3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;margin-bottom:6px;position:relative}
.ses-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ses-no{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--tel)}
.ses-del{background:var(--red-d);color:var(--red);border:1px solid var(--red);border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'Noto Sans',sans-serif}
.ses-edit{background:var(--blu-d);color:var(--blu);border:1px solid var(--blu);border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'Noto Sans',sans-serif;margin-right:4px}

/* remaining card */
.rem-card{border-left:3px solid;padding:9px 11px;border-radius:0 8px 8px 0;margin-bottom:7px;background:var(--sur2)}
.rem-card.grn{border-color:var(--grn)}.rem-card.amb{border-color:var(--amb)}.rem-card.red{border-color:var(--red)}

/* toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--grn-d);border:1px solid var(--grn);color:var(--grn);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:300;display:none;white-space:nowrap}
.toast.show{display:block;animation:fio 2.2s ease forwards}
@keyframes fio{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

.empty{text-align:center;padding:36px 16px;color:var(--tx3);font-size:12px}
</style>
</head>

// App state - in-memory with storage API fallback
let EDITS = {}, GRADE_SESSIONS = {}, PACK_SESSIONS = {}, LEDGER_RATES = {};
// NEW_SLIPS stores slips added via form (not in BASE)
let NEW_SLIPS = [];

async function persistSave(){
  try{
    await window.storage.set('wheat_edits', JSON.stringify(EDITS));
    await window.storage.set('wheat_grade_sessions', JSON.stringify(GRADE_SESSIONS));
    await window.storage.set('wheat_pack_sessions', JSON.stringify(PACK_SESSIONS));
    await window.storage.set('wheat_ledger_rates', JSON.stringify(LEDGER_RATES));
    await window.storage.set('wheat_new_slips', JSON.stringify(NEW_SLIPS));
  } catch(e){}
}
async function persistLoad(){
  try{
    const a=await window.storage.get('wheat_edits'); if(a) EDITS=JSON.parse(a.value);
    const b=await window.storage.get('wheat_grade_sessions'); if(b) GRADE_SESSIONS=JSON.parse(b.value);
    const c=await window.storage.get('wheat_pack_sessions'); if(c) PACK_SESSIONS=JSON.parse(c.value);
    const d=await window.storage.get('wheat_ledger_rates'); if(d) LEDGER_RATES=JSON.parse(d.value);
    const e=await window.storage.get('wheat_new_slips'); if(e) NEW_SLIPS=JSON.parse(e.value);
  } catch(e){}
}
function saveEdits(){ persistSave(); }
function saveGradeSessions(){ persistSave(); }
function savePackSessions(){ persistSave(); }
function saveLedgerRates(){ persistSave(); }

function computeDerived(r){
  // recompute weight chain fields from raw values
  const bwgt = Math.ceil((r.bags||0)*(r.size||0));
  const wgt_bag = r.net_wt ? +((r.net_wt - bwgt)/100).toFixed(4) : 0;
  const bouncing = r.net_wt ? +(Math.ceil((r.net_wt/90)*0.003*100)/100).toFixed(4) : 0;
  const net_weight = +(wgt_bag - bouncing).toFixed(4);
  const tg = +(r.total_graded||0), us = +(r.undersize||0);
  const pq = +(r.pack_qty||0), pl = +(r.pack_loose||0);
  const rem_grading = +(wgt_bag - tg - us).toFixed(4);
  const rem_packing = tg > 0 ? +(tg - pq + pl).toFixed(4) : null;
  return {...r, bag_wgt:bwgt, wgt_bag, bouncing, net_weight, rem_grading, rem_packing};
}

function getData(){
  const base = BASE.map(r => {
    const e = EDITS[r.slipno] || {};
    return computeDerived({...r,...e});
  });
  // Include new slips added via form
  const newRows = NEW_SLIPS.map(r => computeDerived({...r,...(EDITS[r.slipno]||{})}));
  return [...base, ...newRows];
}

const DATA = () => getData().filter(r=>r.variety && String(r.variety)!=='0' && r.supplier && String(r.supplier)!=='0');

function getAllSups(){ return [...new Set(DATA().map(r=>String(r.supplier)).filter(Boolean))].sort(); }
function getAllVars(){ return [...new Set(DATA().map(r=>String(r.variety)).filter(Boolean))].sort(); }

const vc = v => VAR_C[v]||'#8b949e';

let allDates = [...new Set(DATA().map(r=>r.date).filter(Boolean))].sort();
let allVars = getAllVars();
let allSups = getAllSups();
function refreshLists(){
  allDates = [...new Set(DATA().map(r=>r.date).filter(Boolean))].sort();

// FIX J: Compute live remaining grading/packing taking GRADE_SESSIONS and PACK_SESSIONS into account
function getLiveGradeRem(supplier, variety){
  const key=`${supplier}||${variety}`;
  const rows=DATA().filter(r=>String(r.supplier)===String(supplier)&&String(r.variety)===String(variety));
  const totalWgtBag=rows.reduce((a,r)=>a+(+r.wgt_bag||0),0);
  // Graded qty: prefer sessions sum, else max from BASE data
  const sessions=GRADE_SESSIONS[key]||[];
  const gradedTotal = sessions.length>0
    ? sessions.reduce((a,s)=>a+(+s.total_graded||0),0)
    : rows.reduce((a,r)=>a+(+r.total_graded||0),0);
  const usTotal = sessions.length>0
    ? sessions.reduce((a,s)=>a+(+s.undersize||0),0)
    : rows.reduce((a,r)=>a+(+r.undersize||0),0);
  return +(totalWgtBag - gradedTotal - usTotal).toFixed(4);
}
function getLivePackRem(supplier, variety){
  const key=`${supplier}||${variety}`;
  const rows=DATA().filter(r=>String(r.supplier)===String(supplier)&&String(r.variety)===String(variety));
  const gSessions=GRADE_SESSIONS[key]||[];
  const gradedTotal = gSessions.length>0
    ? gSessions.reduce((a,s)=>a+(+s.total_graded||0),0)
    : rows.reduce((a,r)=>a+(+r.total_graded||0),0);
  if(gradedTotal===0) return null;
  const pSessions=PACK_SESSIONS[key]||[];
  const packedTotal = pSessions.length>0
    ? pSessions.reduce((a,s)=>a+(+s.final_packed||0),0)
    : rows.reduce((a,r)=>a+(+r.total_packed||0),0);
  return +(gradedTotal - packedTotal).toFixed(4);
}

const fi=v=>v==null?'—':(+v).toLocaleString('en-IN');
const frs=v=>v==null?'—':'₹'+(+v).toLocaleString('en-IN',{maximumFractionDigits:0});

  const tPacked=rows.reduce((a,r)=>a+(+r.total_packed||0),0);

  const tRemGrade=(()=>{
    const keys=[...new Set(rows.map(r=>`${r.supplier}||${r.variety}`))];
    return keys.reduce((a,k)=>{
      const[s,v]=k.split('||'); return a+Math.max(0,getLiveGradeRem(s,v));
    },0);
  })();
  const tRemPack=(()=>{
    const keys=[...new Set(rows.map(r=>`${r.supplier}||${r.variety}`))];
    return keys.reduce((a,k)=>{
      const[s,v]=k.split('||'); const rem=getLivePackRem(s,v)||0; return a+Math.max(0,rem);

  d.forEach(r=>{if(!r.date)return;byDate[r.date]=byDate[r.date]||{s:0,w:0};byDate[r.date].s++;byDate[r.date].w+=+r.wgt_bag||0;});

  const topV=Object.entries(byV).sort((a,b)=>b[1].w-a[1].w).slice(0,6);
  const maxVW=Math.max(...topV.map(x=>x[1].w),1);

  const gPct=tSlipWt>0?Math.min(100,(tFG/tSlipWt)*100):0;
  const pPct=tFG>0?Math.min(100,(tPacked/tFG)*100):0;

  el.innerHTML=`
  <div class="dc-bar">
    <div class="dc ${selDate==='ALL'?'active':''}" onclick="setDate('ALL')">All</div>
    ${allDates.map(dd=>`<div class="dc ${selDate===dd?'active':''}" onclick="setDate('${dd}')">${dd.slice(5)}</div>`).join('')}
  </div>
  <div class="sh">Inward ${selDate==='ALL'?'(All)':'('+selDate+')'}</div>
  <div class="sg">
    <div class="sc"><div class="sv c-acc">${tSlips}</div><div class="sl">Slips</div></div>
    <div class="sc"><div class="sv c-grn">${tSlipWt.toFixed(1)}</div><div class="sl">Wgt-Bag (qtl)</div></div>
    <div class="sc"><div class="sv c-blu">${tNet.toFixed(1)}</div><div class="sl">Net Wt (qtl)</div></div>
    <div class="sc"><div class="sv c-amb">${(tSlipWt-tNet).toFixed(2)}</div><div class="sl">Bouncing</div></div>
  </div>
  <div class="sh">Grading & Packing</div>
  <div class="sg3">
    <div class="sc"><div class="sv c-tel">${tGraded.toFixed(1)}</div><div class="sl">Graded</div></div>
    <div class="sc"><div class="sv c-pur">${tFG.toFixed(1)}</div><div class="sl">Final Graded</div></div>
    <div class="sc"><div class="sv c-grn">${tPacked.toFixed(1)}</div><div class="sl">Packed</div></div>
  </div>
  <div class="sh">Remaining</div>
  <div class="sg">
    <div class="sc"><div class="sv ${tRemGrade>0?'c-amb':'c-grn'}">${tRemGrade.toFixed(2)}</div><div class="sl">Rem. Grading</div></div>
    <div class="sc"><div class="sv ${tRemPack>0?'c-blu':'c-grn'}">${tRemPack.toFixed(2)}</div><div class="sl">Rem. Packing</div></div>
  </div>
  <div class="cd">
    <div class="pw"><div class="pl"><span>Grading Progress</span><span>${gPct.toFixed(1)}%</span></div><div class="pb"><div class="pf tel" style="width:${gPct}%"></div></div></div>
    <div class="pw" style="margin-top:7px"><div class="pl"><span>Packing Progress</span><span>${pPct.toFixed(1)}%</span></div><div class="pb"><div class="pf grn" style="width:${pPct}%"></div></div></div>
  </div>
  <div class="sh">Daily Inward</div>
  <div class="cd">
    <div class="bc">
      ${cDates.map(dd=>{const h=Math.max(3,Math.round((byDate[dd].w/maxW)*60));const ia=dd===selDate;return`<div class="bc-c" onclick="setDate('${dd}')"><div class="bc-b" style="height:${h}px;background:${ia?'var(--acc)':'var(--blu)'}"></div><div class="bc-l">${dd.slice(5)}</div></div>`;}).join('')}
    </div>
  </div>
  <div class="sh">By Variety</div>
  ${topV.map(([v,s])=>`<div class="cd" style="padding:9px 12px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:7px"><div class="vd" style="background:${vc(v)}"></div><span style="font-size:12px;font-weight:500">${v}</span></div><div style="text-align:right"><div style="font-family:Rajdhani;font-size:15px;font-weight:700">${s.w.toFixed(1)} <span style="font-size:10px;color:var(--tx2)">qtl</span></div><div style="font-size:10px;color:var(--tx3)">${s.s} slips</div></div></div><div class="pb" style="margin-top:6px"><div class="pf" style="width:${(s.w/maxVW)*100}%;background:${vc(v)}"></div></div></div>`).join('')}

// Calculations
function g(id){const e=document.getElementById(id);return e?e.value:'';}
function sv(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function sc2(id,v,clr){const e=document.getElementById(id);if(e){e.textContent=v;if(clr)e.style.color=clr;}}

function calcInward(){
  const f=+g('f_f')||0,s=+g('f_s')||0,bags=+g('f_bags')||0,sz=+g('f_size')||0,rate=+g('f_rate')||0;
  const nwt=f-s, bwgt=Math.ceil(bags*sz);
  const wb=(nwt-bwgt)/100, bo=Math.ceil((nwt/90)*0.003*100)/100, nw=wb-bo;
  const amt=rate&&nw?rate*nw:0;
  sv('ci_wb',nwt>0?wb.toFixed(3)+' qtl':'—');
  sv('ci_bo',nwt>0?bo.toFixed(3)+' qtl':'—');
  sv('ci_nw',nwt>0?nw.toFixed(3)+' qtl':'—');
  sv('ci_amt',amt>0?frs(amt):'—');
}

function calcGrading(){
  const sup=g('g_sup'),vari=g('g_var');
  if(sup&&vari){
    const rows=DATA().filter(r=>String(r.supplier)===sup&&String(r.variety)===vari);
    const wtr=rows.reduce((a,r)=>a+(+r.wgt_bag||0),0);
    sv('g_wtr',wtr.toFixed(3)+' qtl ('+rows.length+' slips)');
    const bags=+g('g_bags')||0,bsz=+g('g_bsz')||0,loose=+g('g_loose')||0;
    const us=+g('g_us')||0,gh=+g('g_gh')||0;
    const tot=(bags*bsz*0.01)+loose,fin=tot+us+gh,diff=wtr-fin;
    sv('g_tot',tot>0?tot.toFixed(3)+' qtl':'—');
    sv('g_fin',fin>0?fin.toFixed(3)+' qtl':'—');
    sc2('g_diff',diff!==0?(diff>0?'+':'')+diff.toFixed(3)+' qtl':'—',diff<0?'var(--red)':'var(--grn)');
  }
}

function calcPacking(){
  const sup=g('p_sup'),vari=g('p_var');
  if(sup&&vari){
    const rows=DATA().filter(r=>String(r.supplier)===sup&&String(r.variety)===vari&&r.total_graded);
    const gin=rows.reduce((a,r)=>a+(+r.total_graded||0),0);
    const ps=PACK_SESSIONS[`${sup}||${vari}`]||[];
    const prevPacked=ps.reduce((a,s)=>a+(+s.total_packed||0),0);
    sv('p_gin',gin.toFixed(3)+' qtl (prev packed: '+prevPacked.toFixed(2)+')');
    const bags=+g('p_bags')||0,bsz=+g('p_bsz')||0,loose=+g('p_loose')||0,gh=+g('p_gh')||0;
    const tot=(bags*bsz*0.01)+loose,fin=tot+gh,diff=gin-fin;
    sv('p_tot',tot>0?tot.toFixed(3)+' qtl':'—');
    sv('p_fin',fin>0?fin.toFixed(3)+' qtl':'—');
    sc2('p_diff',diff!==0?(diff>0?'+':'')+diff.toFixed(3)+' qtl':'—',diff<0?'var(--red)':'var(--grn)');
  }
}

function saveInward(){
  const sno=+g('f_sno');
  if(!sno){showToast('Enter slip number!');return;}
  // BUG B FIX: use editingSlip as the target key when editing (not f_sno which user may have changed)
  const targetKey = editingSlip || sno;

// ── GRADING PAGE ──────────────────────────────────────────────────────────────
function renderGrade(){
  const el=document.getElementById('pgGrade');
  const d=DATA();
  const graded=d.filter(r=>r.total_graded!=null);

  // Group by sup+var - use ALL data rows to compute wt_recpt (FIX G)
  const grouped={};
  // First pass: build groups from all data rows (not just graded)
  d.forEach(r=>{
    const key=`${r.supplier}||${r.variety}`;
    if(!grouped[key]) grouped[key]={supplier:String(r.supplier),variety:String(r.variety),rows:[],wt_recpt:0,total_graded:0,final_graded:0,undersize:0};
    const grp=grouped[key];
    grp.wt_recpt += (+r.wgt_bag||0); // FIX G: sum all wgt_bag, not just graded rows
  });
  // Second pass: overlay grading data
  graded.forEach(r=>{
    const key=`${r.supplier}||${r.variety}`;
    const grp=grouped[key];
    grp.rows.push(r);
    grp.total_graded=Math.max(grp.total_graded,+r.total_graded||0);
    grp.final_graded=Math.max(grp.final_graded,+r.final_graded||0);
    grp.undersize=Math.max(grp.undersize,+r.undersize||0);
  });

  // Add session groups (FIX G: compute wt_recpt from all data rows for session-only groups)
  Object.entries(GRADE_SESSIONS).forEach(([key,sessions])=>{
    if(!grouped[key]){
      const [sup,vari]=key.split('||');
      grouped[key]={supplier:sup,variety:vari,rows:[],wt_recpt:0,total_graded:0,final_graded:0,undersize:0};
      // compute wt_recpt for session-only groups
      grouped[key].wt_recpt = d.filter(r=>String(r.supplier)===sup&&String(r.variety)===vari).reduce((a,r)=>a+(+r.wgt_bag||0),0);
    }
    if(sessions.length>0){
      const sesTotal=sessions.reduce((a,s)=>a+(+s.total_graded||0),0);
      const sesFinal=sessions.reduce((a,s)=>a+(+s.final_graded||0),0);
      const sesUS=sessions.reduce((a,s)=>a+(+s.undersize||0),0);
      grouped[key].total_graded=Math.max(grouped[key].total_graded,sesTotal);
      grouped[key].final_graded=Math.max(grouped[key].final_graded,sesFinal);
      grouped[key].undersize=Math.max(grouped[key].undersize,sesUS);
    }
  });

  const groups=Object.values(grouped).filter(grp=>grp.wt_recpt>0||grp.rows.length>0||(GRADE_SESSIONS[`${grp.supplier||''}||${grp.variety||''}`]||[]).length>0).sort((a,b)=>b.wt_recpt-a.wt_recpt);

  const tWR=groups.reduce((a,g)=>a+g.wt_recpt,0);
  const tFG=groups.reduce((a,g)=>a+g.final_graded,0);
  const tUS=groups.reduce((a,g)=>a+g.undersize,0);
  // FIX J: compute live remaining per group
  const allGradeKeys = [...new Set([...graded.map(r=>`${r.supplier}||${r.variety}`), ...Object.keys(GRADE_SESSIONS)])];
  const tRemG = allGradeKeys.reduce((a,key)=>{const [s,v]=key.split('||');return a+Math.max(0,getLiveGradeRem(s,v));},0);
  const tRemP = allGradeKeys.reduce((a,key)=>{const [s,v]=key.split('||');const rem=getLivePackRem(s,v);return a+Math.max(0,rem||0);},0);

  el.innerHTML=`
  <div class="sh">Summary</div>
  <div class="sg">
    <div class="sc"><div class="sv c-tel">${tWR.toFixed(1)}</div><div class="sl">Wt Recpt (qtl)</div></div>
    <div class="sc"><div class="sv c-pur">${tFG.toFixed(1)}</div><div class="sl">Final Graded</div></div>
    <div class="sc"><div class="sv c-amb">${tUS.toFixed(1)}</div><div class="sl">Undersize</div></div>
    <div class="sc"><div class="sv ${tWR-tFG<0?'c-red':'c-grn'}">${(tWR-tFG).toFixed(2)}</div><div class="sl">Grading Diff</div></div>
  </div>
  <div class="sh">Remaining Balances</div>
  <div class="rem-card ${tRemG>0.1?'amb':'grn'}">
    <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px">Remaining to Grade (All Slips)</div>
    <div style="font-family:Rajdhani;font-size:22px;font-weight:700;color:${tRemG>0.1?'var(--amb)':'var(--grn)'}">${tRemG.toFixed(2)} qtl</div>
    <div style="font-size:10px;color:var(--tx2)">Wgt-Bag − Total Graded − Undersize</div>
  </div>
  <div class="rem-card ${tRemP>0.1?'amb':'grn'}">
    <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px">Remaining to Pack (All Graded)</div>
    <div style="font-family:Rajdhani;font-size:22px;font-weight:700;color:${tRemP>0.1?'var(--blu)':'var(--grn)'}">${tRemP.toFixed(2)} qtl</div>
    <div style="font-size:10px;color:var(--tx2)">Total Graded − Packed Qty + Pack Loose</div>
  </div>
  <div class="sh" style="display:flex;justify-content:space-between;align-items:center"><span>${groups.length} Groups</span><button class="btn btn-e btn-sm" onclick="editGradeSession('',null)">+ New Session</button></div>
  ${groups.map(grp=>{
    const key=`${grp.supplier}||${grp.variety}`;
    const sessions=GRADE_SESSIONS[key]||[];
    const pct=grp.wt_recpt>0?(grp.final_graded/grp.wt_recpt)*100:0;
    const usPct=grp.wt_recpt>0?(grp.undersize/grp.wt_recpt)*100:0;
    const diff=grp.wt_recpt-grp.final_graded;
    // calc remaining for this group
    const remG=Math.max(0,getLiveGradeRem(g.supplier,g.variety));
    const remP=Math.max(0,getLivePackRem(g.supplier,g.variety)||0);
    return`<div class="cd">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-size:13px;font-weight:600">${grp.supplier}</div>
          <div style="display:flex;align-items:center;gap:4px;margin-top:2px"><span class="vd" style="background:${vc(grp.variety)}"></span><span style="font-size:11px;color:var(--tx2)">${grp.variety}</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-family:Rajdhani;font-size:16px;font-weight:700;color:var(--tel)">${grp.wt_recpt.toFixed(2)} <span style="font-size:9px">qtl</span></div>
          <div style="font-size:9px;color:var(--tx3)">${graded.filter(r=>`${r.supplier}||${r.variety}`===key).length} slips${sessions.length?' + '+sessions.length+' ses':''}</div>
        </div>
      </div>
      <div class="dg">
        <div class="db"><div class="db-h">Graded</div>
          <div class="kv"><span class="kk">Total</span><span class="kv-v c-tel">${grp.total_graded.toFixed(2)}</span></div>
          <div class="kv"><span class="kk">U/S</span><span class="kv-v c-amb">${grp.undersize.toFixed(2)}</span></div>
          <div class="kv"><span class="kk">Final</span><span class="kv-v c-pur">${grp.final_graded.toFixed(2)}</span></div>
        </div>
        <div class="db"><div class="db-h">Remaining</div>
          <div class="kv"><span class="kk">Rem Grade</span><span class="kv-v" style="color:${getLiveGradeRem(grp.supplier,grp.variety)>0.01?'var(--amb)':'var(--grn)'}">
            ${getLiveGradeRem(grp.supplier,grp.variety).toFixed(3)}</span></div>
          <div class="kv"><span class="kk">Rem Pack</span><span class="kv-v" style="color:${(getLivePackRem(grp.supplier,grp.variety)||0)>0.01?'var(--blu)':'var(--grn)'}">
            ${getLivePackRem(grp.supplier,grp.variety)!=null?getLivePackRem(grp.supplier,grp.variety).toFixed(3):'—'}</span></div>
          <div class="kv"><span class="kk">U/S %</span><span class="kv-v c-amb">${usPct.toFixed(1)}%</span></div>
        </div>
      </div>
      <div class="pw" style="margin-top:7px">
        <div class="pl"><span>Graded/Recpt</span><span>${pct.toFixed(1)}%</span></div>
        <div class="pb"><div class="pf tel" style="width:${Math.min(100,pct)}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-e btn-sm" onclick="editGradeSession('${key}',null)">+ Grade Session</button>
        <button class="btn btn-e btn-sm" onclick="editPackSession('${key}',null)" style="background:var(--grn-d);color:var(--grn);border-color:var(--grn)">+ Pack Session</button>
      </div>
    </div>`;
  }).join('')}
  `;
}

// ── LEDGER ────────────────────────────────────────────────────────────────────
function renderLedger(){
  const el=document.getElementById('pgLedger');
  const d=DATA();

  // Group by supplier+variety
  const grouped={};
  d.forEach(r=>{
    const key=`${r.supplier}||${r.variety}`;
    if(!grouped[key]) grouped[key]={supplier:String(r.supplier),variety:String(r.variety),slips:[],totalNetWt:0,totalAmt:0};
    const g=grouped[key];
    g.slips.push(r);
    g.totalNetWt+=+r.net_weight||0;
    // Rate: use ledger override, else slip rate, else 0
    const rate=LEDGER_RATES[key]||r.rate;
    if(rate) g.totalAmt+=(+r.net_weight||0)*(+rate);
  });

  const groups=Object.values(grouped).sort((a,b)=>b.totalNetWt-a.totalNetWt);
  const grandNetWt=groups.reduce((a,g)=>a+g.totalNetWt,0);
  const grandAmt=groups.reduce((a,g)=>a+g.totalAmt,0);
  const withRate=groups.filter(g=>g.totalAmt>0).length;

  el.innerHTML=`
  <div class="sh">Ledger Summary</div>
  <div class="sg">
    <div class="sc"><div class="sv c-blu">${grandNetWt.toFixed(1)}</div><div class="sl">Total Net Wt (qtl)</div></div>
    <div class="sc"><div class="sv c-grn" style="font-size:16px">${grandAmt>0?frs(grandAmt):'—'}</div><div class="sl">Total Amount</div></div>
    <div class="sc"><div class="sv c-acc">${groups.length}</div><div class="sl">Farmer Groups</div></div>
    <div class="sc"><div class="sv c-amb">${withRate}</div><div class="sl">With Rate</div></div>
  </div>
  <div class="sh">Farmer × Variety Ledger</div>
  <div class="cd" style="padding:0">
    ${groups.map((g,i)=>{
      const key=`${grp.supplier}||${grp.variety}`;
      const rate=LEDGER_RATES[key]||g.slips[0]?.rate;
      const amt=rate?g.totalNetWt*(+rate):null;
      return`<div class="ledger-row" style="padding:9px 12px" onclick="openLedgerGroup('${key}')">
        <div class="lr-no">${i+1}</div>
        <div class="lr-info">
          <div class="lr-name">${g.supplier}</div>
          <div style="display:flex;align-items:center;gap:3px;margin-top:1px"><span class="vd" style="background:${vc(g.variety)};width:6px;height:6px"></span><span class="lr-sub">${g.variety} · ${g.slips.length} slips</span></div>
        </div>
        <div class="lr-wt">
          <div class="lr-wt-val c-blu">${g.totalNetWt.toFixed(2)}</div>
          <div class="lr-wt-lbl">qtl net wt</div>
        </div>
        <div class="lr-amt">
          ${rate?`<div class="lr-amt-val">${frs(amt)}</div><div class="lr-wt-lbl">@₹${rate}</div>`:`<div style="font-size:11px;color:var(--tx3)">Set rate</div>`}
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function openLedgerGroup(key){
  const [sup,vari]=key.split('||');
  const rows=DATA().filter(r=>String(r.supplier)===sup&&String(r.variety)===vari);
  const savedRate=LEDGER_RATES[key]||rows[0]?.rate||'';
  const totalNetWt=rows.reduce((a,r)=>a+(+r.net_weight||0),0);

  document.getElementById('modalBody').innerHTML=`
  <div class="mt" style="font-size:16px">${sup}</div>
  <div style="display:flex;gap:5px;margin-bottom:13px">
    <span class="pi gray">${vari}</span>
    <span class="pi blu">${rows.length} slips</span>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv c-blu">${totalNetWt.toFixed(3)}</div><div class="sl">Total Net Wt (qtl)</div></div>
    <div class="sc"><div class="sv c-grn" style="font-size:15px" id="led_amt">${savedRate?frs(totalNetWt*(+savedRate)):'Set rate'}</div><div class="sl">Amount</div></div>
  </div>
  <div class="fg" style="margin-bottom:12px">
    <label class="fl">Rate (₹/qtl)</label>
    <div style="display:flex;gap:7px">
      <input class="fi" id="led_rate" type="number" value="${savedRate}" style="flex:1" oninput="previewLedgerAmt('${key}',${totalNetWt})">
      <button class="btn btn-p btn-sm" onclick="saveLedgerRate('${key}',${totalNetWt})">Set</button>
    </div>
  </div>
  <div class="sh">Slip-wise Ledger</div>
  <div class="cd" style="padding:0">
    <div style="display:flex;padding:8px 12px;font-size:10px;color:var(--tx3);border-bottom:1px solid var(--bdr2);font-weight:600;text-transform:uppercase;letter-spacing:.5px">
      <span style="flex:0 0 44px">Slip</span><span style="flex:1">Date / Truck</span><span style="width:70px;text-align:right">Net Wt</span><span style="width:80px;text-align:right">Amount</span>
    </div>
    ${rows.map(r=>{
      const rate=LEDGER_RATES[key]||r.rate;
      const amt=rate?(+r.net_weight||0)*(+rate):null;
      return`<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--bdr2)" onclick="closeModal();openSlip(${r.slipno})">
        <span style="flex:0 0 44px;font-family:Rajdhani;font-size:13px;font-weight:700;color:var(--acc)">#${r.slipno}</span>
        <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.date||'?'} ${r.time||''}</div><div style="font-size:10px;color:var(--tx3)">${r.truck||'—'}</div></div>
        <div style="width:70px;text-align:right"><div style="font-family:Rajdhani;font-size:13px;font-weight:700;color:var(--blu)">${(+r.net_weight||0).toFixed(2)}</div><div style="font-size:9px;color:var(--tx3)">qtl</div></div>
        <div style="width:80px;text-align:right"><div style="font-family:Rajdhani;font-size:13px;font-weight:700;color:var(--grn)">${amt?frs(amt):'—'}</div></div>
      </div>`;
    }).join('')}
    <div style="display:flex;align-items:center;padding:10px 12px;background:var(--sur2)">
      <span style="flex:0 0 44px"></span>
      <span style="flex:1;font-size:11px;font-weight:600;color:var(--tx2)">TOTAL</span>
      <div style="width:70px;text-align:right;font-family:Rajdhani;font-size:15px;font-weight:700;color:var(--blu)">${totalNetWt.toFixed(2)}</div>
      <div style="width:80px;text-align:right;font-family:Rajdhani;font-size:15px;font-weight:700;color:var(--grn)">${savedRate?frs(totalNetWt*(+savedRate)):'—'}</div>
    </div>
  </div>
  <button class="btn btn-s" onclick="closeModal()" style="margin-top:10px">Close</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function previewLedgerAmt(key,totalNetWt){
  const rate=+document.getElementById('led_rate')?.value||0;
  const el=document.getElementById('led_amt');
  if(el) el.textContent=rate?frs(totalNetWt*rate):'—';
}

function saveLedgerRate(key,totalNetWt){
  const rate=+document.getElementById('led_rate')?.value;
  if(!rate){showToast('Enter a rate!');return;}
  LEDGER_RATES[key]=rate;
  saveLedgerRates();
  showToast('Rate saved: ₹'+rate+'/qtl');
  closeModal();
  renderLedger();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function closeModal(){document.getElementById('modal').classList.remove('open');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('show');
  void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2300);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  await persistLoad();
  refreshLists();
  document.getElementById('topBadge').textContent=DATA().length+' Slips';
  renderDash();
}
init();
</script>
</body>
</html>
